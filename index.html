<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <title>Sherlock - 404</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            background-color: #000;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            color: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Background IMG Layer */
        .bg-image {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('sherlock-background.webp') no-repeat center center;
            background-size: cover;
            z-index: 1;
        }

        /* Subtle dark overlay */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.2);
            z-index: 2;
        }

        /* Content container */
        .content {
            position: relative;
            z-index: 3;
            text-align: center;
            padding: 20px;
            margin-top: 18vh; 
        }

        h1 {
            font-size: clamp(3.5rem, 15vw, 7rem);
            margin: 0;
            margin-bottom: 25px; 
            font-weight: 900;
            letter-spacing: -2px;
            text-transform: uppercase;
            text-shadow: 0 10px 30px rgba(0,0,0,0.9);
        }

        p {
            font-size: clamp(1rem, 4vw, 1.4rem);
            max-width: 500px;
            margin: 0 auto;
            margin-bottom: 50px; 
            opacity: 0.9;
            text-shadow: 0 4px 10px rgba(0,0,0,0.9);
            font-weight: 400;
            line-height: 1.8;
        }

        .btn {
            display: inline-block;
            padding: 14px 36px;
            color: #000;
            background: #fff;
            text-decoration: none;
            border-radius: 4px;
            font-weight: bold;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
        }

        .btn:hover {
            transform: translateY(-2px);
            background: #f0f0f0;
            box-shadow: 0 15px 30px rgba(0,0,0,0.6);
        }

        
        /* Responsiveness */
        @media (max-width: 768px) {
            .content {
                margin-top: 10vh;
                padding: 0 30px;
            }
            
            h1 {
                font-size: 5.5rem;
                margin-bottom: 20px;
            }

            p {
                font-size: 1.3rem;
                line-height: 1.5;
                margin-bottom: 40px;
                font-weight: 500;
            }

            .btn {
                width: 100%;
                max-width: 280px;
                padding: 18px 0;
                font-size: 1rem;
            }
        }

        /* Extra tweak for very small phones */
        @media (max-height: 660px) {
            .content {
                margin-top: 5vh;
            }
            h1 { font-size: 4rem; }
        }
    </style>
</head>
<body>
    <div class="bg-image"></div>
    <div class="overlay"></div>

    <div class="content">
        <h1>404</h1>
        <p>
            Looks like this page is missing
            <br>Don't worry though, 
            <br>our bestman is on the case
        </p>
        <a href="#" class="btn">Return to Home</a>
    </div>

</body>
</html>
